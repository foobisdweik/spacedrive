# Serena project configuration for Spacedrive.
# This file is intended to be versioned with the repository.

project_name: "spacedrive"

# Order matters: the first language is Serena's default/fallback language.
languages:
  - rust
  - typescript
  - swift

encoding: "utf-8"
line_ending: "lf"
language_backend: "LSP"

ignore_all_files_in_gitignore: true

ls_specific_settings: {}

# Currently useful only for TypeScript workspace folders outside this repository root.
additional_workspace_folders: []

ignored_paths:
  - packages/ts-client/src/generated.ts
  - packages/swift-client/Sources/SpacedriveClient/**
  - apps/tauri/src-tauri/gen/schemas/**
  - "**/node_modules/**"
  - "**/target/**"
  - "**/.turbo/**"
  - "**/dist/**"
  - "**/build/**"
  - combined_*.txt
  - compile_commands.json

read_only: false

# A fixed semantic-navigation tool set avoids duplicating Codex's native file,
# shell, and editing tools while reducing MCP schema overhead.
fixed_tools:
  - initial_instructions
  - activate_project
  - get_symbols_overview
  - find_symbol
  - find_declaration
  - find_implementations
  - find_referencing_symbols
  - get_diagnostics_for_file
  - get_diagnostics_for_symbol
  - search_for_pattern
  - list_memories
  - read_memory
  - list_dir
  - find_file
  - read_file
  - rename_symbol
  - replace_symbol_body
  - insert_before_symbol
  - insert_after_symbol
  - serena_info
  - get_current_config

# Must remain empty when fixed_tools is non-empty.
excluded_tools: []
included_optional_tools: []

# Onboarding has already been completed; memory tools remain available.
default_modes:
  - no-onboarding
  - editing

added_modes: []

initial_prompt: |-
  This is the Spacedrive Rust, TypeScript, and Swift monorepo.

  Use Serena symbol tools before broad file reads or repository-wide searches.
  Prefer find_symbol, get_symbols_overview, and find_referencing_symbols for semantic navigation.
  Use rg and rg --files for textual discovery; do not ingest the entire repository.

  Codex is the primary implementation agent and owns file modifications.
  Use AGY as an independent paired programmer for architecture analysis, difficult searches,
  alternative implementations, and review. Do not ask AGY to duplicate work already completed
  by Serena or modify the same files concurrently.

  Follow the commands and repository conventions recorded in Serena memories.
  Read memory_maintenance before creating or restructuring memories.
  Do not manually edit generated TypeScript, Swift, or Tauri schema outputs.
  Regenerate them using the repository's generators.

symbol_info_budget: 10

read_only_memory_patterns: []

ignored_memory_patterns:
  - "_archive/.*"
  - "_episodes/.*"
  - "sessions/.*"
